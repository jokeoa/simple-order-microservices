services:
  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order
    ports:
      - "5433:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      - "5434:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.payment-service
    environment:
      PAYMENT_HTTP_ADDR: ":8081"
      PAYMENT_POSTGRES_DSN: postgres://payment:payment@payment-db:5432/payments?sslmode=disable
    depends_on:
      payment-db:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.order-service
    environment:
      ORDER_HTTP_ADDR: ":8080"
      ORDER_POSTGRES_DSN: postgres://order:order@order-db:5432/orders?sslmode=disable
      PAYMENT_BASE_URL: http://payment-service:8081
      PAYMENT_CLIENT_TIMEOUT: 2s
    depends_on:
      order-db:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-web:
    build:
      context: ./order
      dockerfile: Dockerfile
    depends_on:
      order-service:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  order-db-data:
  payment-db-data:

