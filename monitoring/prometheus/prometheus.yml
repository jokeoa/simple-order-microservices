global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: ads2-assignment

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: order-service
    static_configs:
      - targets:
          - order-service:8080

  - job_name: payment-service
    static_configs:
      - targets:
          - payment-service:8081

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
